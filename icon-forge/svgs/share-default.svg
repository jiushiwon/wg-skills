<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F0EE"/>
      <stop offset="100%" stop-color="#D4E5E0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7BA59D"/>
      <stop offset="100%" stop-color="#6B968E"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="500" height="400" fill="url(#bg)"/>

  <!-- 装饰圆 -->
  <circle cx="80" cy="80" r="120" fill="#7BA59D" opacity="0.08"/>
  <circle cx="420" cy="320" r="100" fill="#7BA59D" opacity="0.06"/>
  <circle cx="450" cy="60" r="60" fill="#D4A5A5" opacity="0.1"/>

  <!-- 主卡片 -->
  <rect x="50" y="70" width="400" height="260" rx="24" fill="white" opacity="0.95"/>
  <rect x="50" y="70" width="400" height="260" rx="24" fill="url(#cardGrad)" opacity="0.9"/>

  <!-- 图标区域 -->
  <circle cx="130" cy="150" r="36" fill="white" opacity="0.2"/>
  <g transform="translate(110, 130) scale(1.5)" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <path d="M9 22V12h6v10"/>
  </g>

  <!-- 标题 -->
  <text x="190" y="145" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="white">久坐自救指南</text>
  <text x="190" y="180" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="white" opacity="0.85">每天3分钟，守护颈椎与眼睛</text>

  <!-- 分隔线 -->
  <line x1="80" y1="210" x2="420" y2="210" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- 功能标签 -->
  <g transform="translate(80, 230)">
    <rect width="110" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="55" y="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="white" text-anchor="middle">健康评估</text>
  </g>
  <g transform="translate(200, 230)">
    <rect width="110" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="55" y="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="white" text-anchor="middle">每日打卡</text>
  </g>
  <g transform="translate(320, 230)">
    <rect width="110" height="36" rx="18" fill="white" opacity="0.2"/>
    <text x="55" y="24" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="white" text-anchor="middle">数据追踪</text>
  </g>

  <!-- 底部标语 -->
  <text x="250" y="310" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="14" fill="white" opacity="0.7" text-anchor="middle">给久坐屏幕族的健康生活方式小助手</text>

  <!-- 小程序标识 -->
  <text x="250" y="350" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="12" fill="#7BA59D" text-anchor="middle">扫码体验小程序</text>
</svg>